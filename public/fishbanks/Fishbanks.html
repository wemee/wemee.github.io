<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>漁人的榮耀 - Version 1.0</title>
<link rel="stylesheet" type="text/css" href="files/main.css" />
<link rel="stylesheet" type="text/css" href="files/print.css" media="print" />

<!-- Google tag (gtag.js) -->

	window.dataLayer = window.dataLayer || [];

<style>
.chart-legend ul { list-style-type: none; }
.chart-legend li span {
	display: inline-block;
	width: 12px;
	height: 12px;
	margin-right: 5px;
	list-style-type: none;
}
</style>
</head>
<body>
<div id="app"></div>

<!-- ============================================================ -->
<!-- Page templates. The router clones one of these into #app and -->
<!-- then calls window['init_' + name]() if defined.              -->
<!-- ============================================================ -->

<template id="tpl-teams">
	<table style="width:600px; margin: 0 auto;">
	<tr>
	<td width="560"><img src="images/5.jpg" width="560" height="120" alt="漁人的榮耀" /></td>
	</tr>
	<tr>
	<td>
		<h1>開新遊戲</h1>
		<form name="StartGameFrm" id="StartGameFrm">
			<table width="100%" name="StartGameTbl" id="StartGameTbl">
			<tr>
				<td>參與單位:
					<input type="text" name="OrganizationFld" size="30" maxlength="20" tabindex="1" />
				</td>
			</tr>
			<tr>
				<td>日期:
					<input type="date" name="DateFld" size="30" maxlength="20" tabindex="1" />
				</td>
			</tr>
			<tr>
				<td>參與人數:
					<input type="number" name="AttendanceFld" size="30" maxlength="20" tabindex="1" />
				</td>
			</tr>
			<tr>
				<td>備註:
					<input type="text" name="SessionFld" size="30" maxlength="20" tabindex="1" />
				</td>
			</tr>
			<tr>
				<td>分成幾組:
					<select name="TeamsSel" onchange="setTeams(this.selectedIndex + 1)">
						<option>1</option>
						<option>2</option>
						<option>3</option>
						<option selected="selected">4</option>
						<option>5</option>
						<option>6</option>
						<option>7</option>
						<option>8</option>
					</select>
				</td>
			</tr>
			<tr>
				<td>
					<input type="button" name="AboutBtn" value="關於漁人的榮耀" onclick="aboutGame()" />&nbsp;
					<input type="button" name="BeginBtn" value="進入起始設定" onclick="beginGame()" />&nbsp;
				</td>
			</tr>
			</table>
		</form>
	</td>
	</tr>
	</table>
</template>

<template id="tpl-setup">
	<div style="padding:2rem; text-align:center;">
		<h2>🚧 起始設定頁尚未遷移</h2>
		<p>Phase 1 範圍只完成 teams + router。</p>
		<p><a href="javascript:goto('teams')">回到開新遊戲</a></p>
	</div>
</template>

<template id="tpl-decisions">
	<div style="padding:2rem; text-align:center;">
		<h2>🚧 小組決策頁尚未遷移</h2>
		<p><a href="javascript:goto('teams')">回到開新遊戲</a></p>
	</div>
</template>

<template id="tpl-reports">
	<div style="padding:2rem; text-align:center;">
		<h2>🚧 報表頁尚未遷移</h2>
		<p><a href="javascript:goto('teams')">回到開新遊戲</a></p>
	</div>
</template>

<template id="tpl-graphs">
	<div style="padding:2rem; text-align:center;">
		<h2>🚧 圖表頁尚未遷移</h2>
		<p><a href="javascript:goto('teams')">回到開新遊戲</a></p>
	</div>
</template>

<template id="tpl-about">
	<div style="padding:2rem; text-align:center;">
		<h2>🚧 關於頁尚未遷移</h2>
		<p><a href="javascript:goto('teams')">回到開新遊戲</a></p>
	</div>
</template>

<script src="mainlib.js"></script>
<script src="files/Chart.js"></script>
<script src="files/teamslib.js"></script>
<script src="files/setuplib.js"></script>
<script src="files/decisionslib.js"></script>
<script src="files/reportslib.js"></script>
<script src="files/graphslib.js"></script>
<script src="files/aboutlib.js"></script>
<script src="files/router.js"></script>
</body>
</html>
