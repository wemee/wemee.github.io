<template id="tpl-teams">
	<table style="max-width:600px; width:100%; margin: 0 auto;">
	<tr>
	<td width="560"><img src="images/5.jpg" width="560" height="120" alt="漁人的榮耀" /></td>
	</tr>
	<tr>
	<td>
		<h1>開新遊戲</h1>
		<form name="StartGameFrm" id="StartGameFrm">
			<table width="100%" name="StartGameTbl" id="StartGameTbl">
			<tr>
				<td>參與單位:
					<input type="text" name="OrganizationFld" size="30" maxlength="20" tabindex="1" />
				</td>
			</tr>
			<tr>
				<td>日期:
					<input type="date" name="DateFld" size="30" maxlength="20" tabindex="1" />
				</td>
			</tr>
			<tr>
				<td>參與人數:
					<input type="number" name="AttendanceFld" size="30" maxlength="20" tabindex="1" />
				</td>
			</tr>
			<tr>
				<td>備註:
					<input type="text" name="SessionFld" size="30" maxlength="20" tabindex="1" />
				</td>
			</tr>
			<tr>
				<td>分成幾組:
					<select name="TeamsSel" onchange="setTeams(this.selectedIndex + 1)">
						<option>1</option>
						<option>2</option>
						<option>3</option>
						<option selected="selected">4</option>
						<option>5</option>
						<option>6</option>
						<option>7</option>
						<option>8</option>
					</select>
				</td>
			</tr>
			<tr>
				<td>
					<input type="button" name="AboutBtn" value="關於漁人的榮耀" onclick="aboutGame()" />&nbsp;
					<input type="button" name="BeginBtn" value="進入起始設定" onclick="beginGame()" />&nbsp;
				</td>
			</tr>
			</table>
		</form>
		<p class="v1-link">→ <a href="v1/Fishbanks.html">查看 2017 年中文化原版 (v1)</a></p>
	</td>
	</tr>
	</table>
</template>

<template id="tpl-setup">

	<tr>

				<td>&nbsp;&nbsp;&nbsp;&nbsp;組別:</td>
			</tr>
			<tr id="setup-row-team-ships">
				<td>&nbsp;&nbsp;&nbsp;&nbsp;船數:</td>
			</tr>
			<tr id="setup-row-team-balance">

			</tr>

			<tr>
				<td>&nbsp;</td>
				<td class="col2">遠洋</td>
				<td class="col3">近海</td>
				<td class="col4">港口</td>

			<tr>

			<tr>

				<td class="col3"><input type="text" name="InitFishCoastFld" size="7" tabindex="26" onchange="return validateInitFishCoast(this);" /></td>
				<td class="col4">&nbsp;</td>
				<td></td><td></td><td></td>
			</tr>
			<tr>
				<td>操作成本:</td>
				<td class="col2"><input type="text" name="OpCostDeepFld" size="7" tabindex="0" /></td>
				<td class="col3"><input type="text" name="OpCostCoastFld" size="7" tabindex="0" /></td>

				<td></td><td></td><td></td>
			</tr>
			<tr><td colspan="7">&nbsp;</td></tr>
			<tr>

						<option value="2">公式二(請告訴我公式)</option>

<template id="tpl-about">
	<table>
	<tr>
	<td width="560"><img src="images/5.jpg" width="560" height="120" alt="漁人的榮耀" /></td>
	</tr>
	<tr>
	<td>
		<h2>【漁人的榮耀】遊戲簡介</h2>
		<form name="AboutGameFrm" id="AboutGameFrm">
			<table width="560">
			<tr>
			<td>
				<p>
					漁人，捕魚的人，靠海維生的人，

接受著大海的賜與，也承受著大海的洗鍊。

過去，漁人的榮耀來自於滿載而歸，

來自於買更大更先進的船、捕回更多的魚，

賺了大錢，給家人更好的生活品質與社經地位。

然後，有一天，魚不來了。

曾經的榮耀光環，褪色了。

當海洋即將要背棄自己的時候，

漁人審回首檢視過去的榮景，

思考著：是榮耀離我而去，還是我誤解了榮耀的真實義？
				</p>
				【漁人的榮耀】是一個由多位玩家共同參與的互動式角色扮演模擬遊戲。它提供玩家一個貼近真實的情境，令其經歷從｢製造問題｣到｢深入看見問題｣、甚至｢嘗試解決問題｣的完整過程，來認識海洋資源的重重困境與難題，進而反思在資源共享的環境中，可以如何永續性地利用或管理自然資源。
				<p>
				</p>
				遊戲中，玩家扮演漁船公司出海捕魚，相互買賣船隻，參與競標，決定前往哪個海域捕魚，在欲求、壓力、決策、妥協、抵制等力量的交織之下，相互競爭著海洋裏的資源，以滿足遊戲中「贏」的條件。各家漁船公司也將共同創造極需磋商討論的情勢，考驗著公司之間在溝通與協調上的技能、洞悉問題的眼界，以及解決問題的膽識。透過親身經歷體會「共有財的悲劇」（the tragedy of the commons），以及看見人類如何屈就於慾望而快速掠奪共同卻也是唯一的地球資源，引發個人更深更廣的覺察。
				<p>
					【漁人的榮耀】以感同身受的方式取代標語式的推廣口號，讓遊戲中的體驗和感受化為行動力；它讓關心海洋資源問題的人們進一步驗證可能的解決方式，也讓那些對海洋資源感到陌生的人們，開始感受、思考、關懷這些我們片刻仰賴的天賜珍寶；它讓玩家們重新發掘「漁人的榮耀」，除了能夠獲得短期利益，也在於追求長久共好。
				</p>
				<p>
					在複雜卻充滿生態規律的情境中，漁人的榮耀彰顯，操之在己。
				</p>

				<h2>【漁人的榮耀】緣起</h2>

				<p>
					本遊戲之遊戲程式改版自互動式角色扮演模擬遊戲FishBanks Ltd. 8.02 © 2004（簡稱Fishbanks）。Fishbanks是由美國麻省理工學院史隆管理研究室Dennis L. Meadows教授及其團隊所創發。講師林思吟於國際場合參與該遊戲數次，並決定購買軟體引進台灣，自2008年起由社團法人台灣海洋環境教育推廣協會（TAMEE）開始在全台推廣該遊戲至今。至2014年底為止，已辦理135場次，帶領超過5,400位民眾體驗遊戲場景，藉此認識海洋資源匱乏的現實，並反思自身責任與對應之道。
				</p>
				<p>
					原軟體為英文版，對多數國內教育推廣者而言使用相對不易，加上為使得遊戲情境更能貼近現實狀況，在與原作者Meadows教授連略並取得其同意之下，TAMEE將Fishbanks改版為中文並增加其他功能，並命名為【漁人的榮耀】。除了介面清晰且可以同時容納更多參與者之外，【漁人的榮耀】包含更多對應社會現況的新設計，可在短時間內模擬地球環境資源遭濫用、匱乏的長期過程，且可衍伸闡述海洋永續、環境管理、公平正義、全球暖化、氣候變遷、生物多樣性、全球化與資本主義等多元主題，是海洋、環境、永續教育等中的良好媒介。
				</p>
				<p>
					【漁人的榮耀】得以誕生，TAMEE要特別感謝Dennis L. Meadows教授的慷慨與支持，以及工程師蔡至勇先生的精闢巧思、講師洪鈴雅的悉心統籌和其他所有講師的參與討論及測試。祈願這款遊戲將利益更多人群，以及我們所共享的海洋資源與環境。
				</p>
