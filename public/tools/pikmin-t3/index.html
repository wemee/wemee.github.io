<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>T3 Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #111; color: #eee; padding: 24px; min-height: 100vh; }

    /* ── Header ───────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .header h1 { font-size: 0.9rem; color: #555; letter-spacing: 1px; }

    .sort-btn {
      font-family: monospace;
      font-size: 0.9rem;
      background: #2a2a2a;
      border: 1px solid #4a4a4a;
      color: #fa6;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
    }
    .sort-btn:hover  { background: #333; }
    .sort-btn:active { background: #444; }

    /* ── Grid ─────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    /* ── Group card ───────────────────────── */
    .group {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Title */
    .title-input {
      font-family: monospace;
      font-size: 1rem;
      background: transparent;
      border: none;
      border-bottom: 1px solid #333;
      color: #ccc;
      padding: 4px 0;
      width: 100%;
      outline: none;
    }
    .title-input::placeholder { color: #3a3a3a; }
    .title-input:focus { border-bottom-color: #666; }

    /* T1 input row */
    .input-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .t1-input {
      font-family: monospace;
      font-size: 1.2rem;
      background: #222;
      border: 1px solid #444;
      color: #fff;
      padding: 5px 8px;
      width: 90px;
      border-radius: 4px;
      outline: none;
    }
    .t1-input:focus { border-color: #6af; }

    /* +/- buttons */
    .adj-btn {
      font-family: monospace;
      font-size: 0.9rem;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #aaa;
      padding: 5px 8px;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }
    .adj-btn:hover  { background: #333; color: #fff; }
    .adj-btn:active { background: #444; }

    /* Time rows */
    .time-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .label { color: #555; font-size: 0.8rem; width: 22px; }
    .value { font-size: 1.9rem; letter-spacing: 1px; }
    .t1-val { color: #6af; }
    .t2-val { color: #8f8; }
    .t3-val { color: #fa6; font-size: 2.4rem; font-weight: bold; }

    .hint { color: #3a3a3a; font-size: 0.7rem; }

    /* ── T3 countdown (main visual) ──────── */
    .t3-countdown {
      font-size: 3.2rem;
      font-weight: bold;
      letter-spacing: 2px;
      color: #fff;
      text-align: center;
      padding: 10px 0 6px;
      border-bottom: 1px solid #2a2a2a;
      margin-bottom: 2px;
    }
    .t3-countdown.warning { color: #f84; }   /* < 1 min before T3 */
    .t3-countdown.idle    { color: #333; }
  </style>
</head>
<body>
  <div class="header">
    <h1>T3 = T1 + T2 + 5min</h1>
    <button class="sort-btn" id="sort-btn">&#8597; 依 T3 排序</button>
  </div>
  <div class="grid" id="grid"></div>

  <script>
    // ── CONFIG ──────────────────────────────────────────
    const GROUP_COUNT      = 12;
    const EXTRA_SECONDS    = 5 * 60;
    const NOTIFY_THRESHOLD = 60;        // seconds before t3 to notify
    const STORAGE_KEY      = 't3calc';

    // ── STATE ───────────────────────────────────────────
    // states[i] = null (idle) or { t1, t2, t3, pressedAt, notified }
    const states = Array.from({ length: GROUP_COUNT }, () => null);

    // ── PARSE ───────────────────────────────────────────
    function parseInput(raw) {
      const d = raw.trim();
      if (d.length === 0 || d.length > 5 || !/^\d+$/.test(d)) return null;
      let h = 0, m = 0, s = 0;
      if      (d.length === 5) { h = +d[0]; m = +d.slice(1,3); s = +d.slice(3,5); }
      else if (d.length === 4) {             m = +d.slice(0,2); s = +d.slice(2,4); }
      else if (d.length === 3) {             m = +d[0];         s = +d.slice(1,3); }
      else                     {                                 s = +d;            }
      return h * 3600 + m * 60 + s;
    }

    // ── FORMAT ──────────────────────────────────────────
    function fmt(totalSec) {
      const neg = totalSec < 0;
      const abs = Math.abs(totalSec);
      const h   = Math.floor(abs / 3600);
      const m   = Math.floor((abs % 3600) / 60);
      const s   = abs % 60;
      const str = [h, m, s].map(v => String(v).padStart(2, '0')).join(':');
      return neg ? '-' + str : str;
    }

    function nowSeconds() {
      const d = new Date();
      return d.getHours() * 3600 + d.getMinutes() * 60 + d.getSeconds();
    }

    // ── PERSIST ─────────────────────────────────────────
    // Only title + t3 are saved; t1 is re-derived on load as t3 − t2_now − EXTRA
    function saveState() {
      const grid  = document.getElementById('grid');
      const items = Array.from(grid.children);
      const data  = items.map(el => {
        const idx = +el.dataset.group;
        return {
          title: el.querySelector('.title-input').value,
          t3:    states[idx] ? states[idx].t3 : null,
        };
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadState() {
      let data;
      try { data = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return; }
      if (!Array.isArray(data)) return;

      const grid  = document.getElementById('grid');
      const items = Array.from(grid.children);

      data.forEach((item, slot) => {
        const el = items[slot];
        if (!el) return;
        const idx = +el.dataset.group;

        if (item.title) el.querySelector('.title-input').value = item.title;

        if (item.t3 !== null) {
          const t2 = nowSeconds();
          const t1 = item.t3 - EXTRA_SECONDS - t2;
          if (t1 > 0) {
            states[idx] = {
              t1,
              t2,
              t3:        item.t3,
              pressedAt: Date.now(),
              notified:  t1 < NOTIFY_THRESHOLD, // skip notify if already in window
            };
          }
          // t1 <= 0 means countdown already finished — leave state null, keep title
        }
      });
    }

    // ── NOTIFICATION ────────────────────────────────────
    function requestNotifyPermission() {
      if (Notification.permission === 'default') Notification.requestPermission();
    }

    function sendNotify(i) {
      if (Notification.permission !== 'granted') return;
      const label = getEl(i, 'title-input')?.value.trim() || `第 ${i + 1} 組`;
      new Notification(`⚠️ ${label} — T3 剩不到 1 分鐘`, {
        body: `T3 = ${fmt(states[i].t3)}`,
        silent: false,
      });
    }

    // ── ACTIONS ─────────────────────────────────────────
    function onEnter(i, raw) {
      const t1 = parseInput(raw);
      if (t1 === null) { alert('格式錯誤，請輸入最多 5 位數字'); return; }
      const t2 = nowSeconds();
      states[i] = { t1, t2, t3: t1 + t2 + EXTRA_SECONDS, pressedAt: Date.now(), notified: false };
      saveState();
    }

    function adjust(i, delta) {
      const s = states[i];
      if (!s) return;
      s.t1 += delta;
      s.t3 += delta;
      const elapsed   = Math.floor((Date.now() - s.pressedAt) / 1000);
      const t1remain  = s.t1 - elapsed;
      if (t1remain + EXTRA_SECONDS >= NOTIFY_THRESHOLD) s.notified = false;
      saveState();
    }

    function clearGroup(i) {
      states[i] = null;
      const cd = getEl(i, 't3-countdown');
      cd.textContent  = '--:--:--';
      cd.className    = 't3-countdown idle';
      getEl(i, 't1-val').textContent = '--:--:--';
      getEl(i, 't2-val').textContent = '--:--:--';
      getEl(i, 't3-val').textContent = '--:--:--';
      saveState();
    }

    // ── SORT ────────────────────────────────────────────
    function sortByT3() {
      const grid  = document.getElementById('grid');
      const items = Array.from(grid.children);
      const pairs = items.map(el => ({ el, state: states[+el.dataset.group] }));

      // active groups first (ascending t3); idle/expired last
      pairs.sort((a, b) => {
        if (!a.state && !b.state) return 0;
        if (!a.state) return 1;
        if (!b.state) return -1;
        return a.state.t3 - b.state.t3;
      });

      pairs.forEach(({ el, state }, newIdx) => {
        states[newIdx] = state;
        el.dataset.group = newIdx;
        grid.appendChild(el);
      });
    }

    // ── TICK ────────────────────────────────────────────
    function tick() {
      for (let i = 0; i < GROUP_COUNT; i++) {
        const s = states[i];
        if (!s) continue;
        const elapsed  = Math.floor((Date.now() - s.pressedAt) / 1000);
        const t1remain = s.t1 - elapsed;

        // T3 reached → clear data, keep title
        if (t1remain + EXTRA_SECONDS <= 0) {
          clearGroup(i);
          continue;
        }

        const t3remain = t1remain + EXTRA_SECONDS; // T3 − T2_now

        // notify when 1 min before T3
        if (t3remain < NOTIFY_THRESHOLD && !s.notified) {
          s.notified = true;
          sendNotify(i);
        }

        const cd = getEl(i, 't3-countdown');
        cd.textContent = fmt(t3remain);
        cd.className = 't3-countdown' + (t3remain < NOTIFY_THRESHOLD ? ' warning' : '');

        getEl(i, 't1-val').textContent = fmt(t1remain);
        getEl(i, 't2-val').textContent = fmt(s.t2 + elapsed);
        getEl(i, 't3-val').textContent = fmt(s.t3);
      }
    }

    // ── HELPERS ─────────────────────────────────────────
    function getEl(i, cls) {
      return document.querySelector(`[data-group="${i}"] .${cls}`);
    }

    // ── RENDER ──────────────────────────────────────────
    function renderGroups() {
      const grid = document.getElementById('grid');
      for (let i = 0; i < GROUP_COUNT; i++) {
        const div = document.createElement('div');
        div.className = 'group';
        div.dataset.group = i;
        div.innerHTML = `
          <input class="title-input" type="text" placeholder="標題 ${i + 1}">
          <div class="t3-countdown idle">--:--:--</div>
          <div class="input-row">
            <input class="t1-input" type="text" maxlength="5" placeholder="hmmss">
            <button class="adj-btn" data-delta="-1">-1s</button>
            <button class="adj-btn" data-delta="1">+1s</button>
          </div>
          <div class="hint">hmmss / mss / ss，按 Enter</div>
          <div class="time-row"><span class="label">T1</span><span class="value t1-val">--:--:--</span></div>
          <div class="time-row"><span class="label">T2</span><span class="value t2-val">--:--:--</span></div>
          <div class="time-row"><span class="label">T3</span><span class="value t3-val">--:--:--</span></div>
        `;
        div.querySelector('.t1-input').addEventListener('keydown', e => {
          if (e.key === 'Enter') onEnter(i, e.target.value);
        });
        div.querySelectorAll('.adj-btn').forEach(btn => {
          btn.addEventListener('click', () => adjust(i, +btn.dataset.delta));
        });
        // save title whenever it changes
        div.querySelector('.title-input').addEventListener('input', saveState);
        grid.appendChild(div);
      }
    }

    document.getElementById('sort-btn').addEventListener('click', sortByT3);

    renderGroups();
    loadState();           // restore from localStorage after DOM is ready
    requestNotifyPermission();
    setInterval(tick, 1000);
  </script>
</body>
</html>
